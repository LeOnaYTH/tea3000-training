<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>吃茶三千 · 手搖調理模擬</title>
<style>
:root{--green:#1f4d3a;--gold:#c9a05a;--cream:#f7f1e5;--milk:#efe4d0;--red:#c0564a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lock{background:#fff;border-radius:20px;padding:32px 26px;max-width:360px;width:100%;text-align:center;box-shadow:0 4px 16px rgba(31,77,58,.12);}
.lock .ic{font-size:2.4rem;}
.lock h1{color:var(--green);font-size:1.15rem;letter-spacing:.12em;margin:12px 0 6px;}
.lock p{color:#8a8272;font-size:.8rem;line-height:1.7;margin-bottom:18px;}
.lock input{width:100%;border:2px solid var(--milk);border-radius:12px;padding:13px;font-size:1.2rem;text-align:center;letter-spacing:.4em;font-family:inherit;outline:none;}
.lock input:focus{border-color:var(--gold);}
.lock button{width:100%;margin-top:14px;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;letter-spacing:.25em;cursor:pointer;font-family:inherit;}
.lock .err{color:var(--red);font-size:.78rem;margin-top:10px;min-height:1.2em;}
.lock .legal{margin-top:18px;font-size:.66rem;color:#a89e8c;line-height:1.7;border-top:1px solid var(--milk);padding-top:12px;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.shake{animation:shake .3s;}
</style>
</head>
<body>
<div class="lock" id="lock">
  <div class="ic">🔐</div>
  <h1>手搖調理模擬</h1>
  <p>本教材僅供內部培訓使用<br>請輸入培訓密碼解鎖</p>
  <input id="pwd" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">
  <button id="go">解 鎖</button>
  <div class="err" id="err"></div>
  <div class="legal">智慧財產權均屬方圓國際所有<br>僅供培訓專用，禁止外洩</div>
</div>

      const box=document.getElementById('lock');
      document.getElementById('err').textContent='密碼錯誤，請重新輸入';
      box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
      document.getElementById('pwd').value='';
    }
    return false;
  }
}
document.getElementById('go').onclick=()=>unlock(document.getElementById('pwd').value);
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(e.target.value);});
try{const saved=sessionStorage.getItem('fy_unlock'); if(saved) unlock(saved,true);}catch(e){}
</script>
