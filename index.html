<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>吃茶三千 · 考核前練習工具</title>
<style>
:root{
  --green:#1f4d3a; --green-dark:#143327; --gold:#c9a05a; --cream:#f7f1e5;
  --milk:#efe4d0; --red:#c0564a; --ok:#3e8e5f; --ink:#2b2b28;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; background:var(--cream); color:var(--ink); min-height:100vh;}
.wrap{max-width:560px; margin:0 auto; padding:16px 16px 48px;}
header.top{background:var(--green); color:#fff; padding:20px 16px; text-align:center; border-radius:0 0 22px 22px;}
header.top h1{font-size:1.3rem; letter-spacing:.15em;}
header.top p{color:var(--gold); font-size:.82rem; margin-top:6px; letter-spacing:.08em;}
.card{background:#fff; border-radius:16px; padding:16px; margin-top:14px; box-shadow:0 2px 8px rgba(31,77,58,.08); cursor:pointer; display:flex; align-items:center; gap:14px; transition:.15s;}
.card:active{transform:scale(.98);}
.card .num{flex:0 0 46px; height:46px; border-radius:12px; background:var(--milk); color:var(--green); font-weight:700; display:flex; align-items:center; justify-content:center; font-size:1.1rem;}
.card .info{flex:1;}
.card .info h3{font-size:1rem; color:var(--green-dark);}
.card .info p{font-size:.76rem; color:#8a8272; margin-top:3px;}
.badge{display:inline-block; background:var(--milk); color:var(--green); border-radius:20px; padding:2px 10px; font-size:.7rem; margin-top:5px;}
.mastery{white-space:nowrap; text-align:right;}
.mastery .pct{font-weight:800; font-size:1.05rem; color:var(--green);}
.mastery .pct.hi{color:var(--ok);}
.mastery small{display:block; color:#8a8272; font-size:.7rem; margin-top:2px;}
.mastery .wrongtag{display:inline-block; margin-top:4px; background:#faeae8; color:var(--red); border-radius:10px; padding:1px 8px; font-size:.68rem;}
.screen{display:none;}
.screen.active{display:block; animation:fade .25s;}
@keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1;}}
.gamebar{display:flex; justify-content:space-between; align-items:center; margin:14px 0 6px;}
.gamebar .back{background:none; border:none; color:var(--green); font-size:.88rem; cursor:pointer; padding:6px; font-family:inherit;}
.gamebar .phase{font-weight:700; color:var(--green); font-size:.85rem;}
.gamebar .phase.retry{color:var(--red);}
.progress{height:8px; background:var(--milk); border-radius:6px; overflow:hidden; margin-bottom:16px;}
.progress i{display:block; height:100%; background:var(--gold); width:0%; transition:width .3s; border-radius:6px;}
.qtitle{font-size:.78rem; color:var(--gold); font-weight:700; letter-spacing:.08em; margin-bottom:8px;}
.qtext{font-size:1.05rem; line-height:1.6; color:var(--green-dark); font-weight:600; margin-bottom:16px; white-space:pre-line;}
.opt{display:block; width:100%; text-align:left; background:#fff; border:2px solid #e4dbc8; border-radius:14px; padding:14px 16px; font-size:.95rem; margin-bottom:10px; cursor:pointer; line-height:1.5; transition:.15s; font-family:inherit; color:var(--ink);}
.opt:active{transform:scale(.98);}
.opt.correct{border-color:var(--ok); background:#e9f5ee; font-weight:600;}
.opt.wrong{border-color:var(--red); background:#faeae8;}
.opt:disabled{cursor:default; opacity:.92;}
.explain{background:var(--milk); border-radius:12px; padding:12px 14px; font-size:.85rem; line-height:1.7; margin-top:6px; color:#5a5344; display:none;}
.explain.show{display:block; animation:fade .25s;}
.explain b{color:var(--green);}
.nextbtn{display:none; width:100%; background:var(--green); color:#fff; border:none; border-radius:14px; padding:14px; font-size:1rem; font-weight:600; margin-top:14px; cursor:pointer; font-family:inherit; letter-spacing:.1em;}
.nextbtn.show{display:block; animation:fade .25s;}
.oxrow{display:flex; gap:12px; margin-top:10px;}
.oxrow button{flex:1; border:none; border-radius:14px; padding:18px 10px; font-size:1.05rem; font-weight:700; cursor:pointer; font-family:inherit; letter-spacing:.1em;}
.oxrow .okbtn{background:#e9f5ee; color:var(--ok); border:2px solid var(--ok);}
.oxrow .ngbtn{background:#faeae8; color:var(--red); border:2px solid var(--red);}
.statement{background:#fff; border:2px solid #e4dbc8; border-radius:16px; padding:22px 18px; font-size:1.02rem; line-height:1.7; text-align:center; font-weight:600; color:var(--green-dark); min-height:110px; display:flex; align-items:center; justify-content:center;}
.match-area{display:flex; gap:10px;}
.match-col{flex:1; display:flex; flex-direction:column; gap:8px;}
.mcard{border:2px solid #e4dbc8; background:#fff; border-radius:12px; padding:12px 8px; font-size:.82rem; line-height:1.45; cursor:pointer; text-align:center; font-family:inherit; color:var(--ink); transition:.15s; min-height:58px;}
.mcard.sel{border-color:var(--gold); background:#fdf6e8; font-weight:700;}
.mcard.done{border-color:var(--ok); background:#e9f5ee; color:var(--ok); cursor:default; opacity:.85;}
.mcard.shake{animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.binrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
.binrow button{border:2px solid var(--green); background:#fff; color:var(--green); border-radius:12px; padding:14px 8px; font-size:.9rem; font-weight:700; cursor:pointer; font-family:inherit;}
.binrow button.correct{background:#e9f5ee; border-color:var(--ok); color:var(--ok);}
.binrow button.wrong{background:#faeae8; border-color:var(--red); color:var(--red);}
.itemcard{background:var(--green); color:#fff; border-radius:16px; padding:22px 16px; text-align:center; font-size:1.2rem; font-weight:700; letter-spacing:.1em;}
.itemcard small{display:block; color:var(--gold); font-size:.75rem; margin-top:6px; font-weight:400;}
.seq-pool{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;}
.seq-pool button{border:2px solid #e4dbc8; background:#fff; border-radius:20px; padding:10px 14px; font-size:.85rem; cursor:pointer; font-family:inherit; transition:.15s;}
.seq-pool button.used{opacity:.25; pointer-events:none;}
.seq-pool button.shake{animation:shake .3s; border-color:var(--red);}
.seq-done{display:flex; flex-wrap:wrap; gap:6px; min-height:44px; background:var(--milk); border-radius:12px; padding:8px; margin-top:12px; align-items:center;}
.seq-done span{background:var(--green); color:#fff; border-radius:16px; padding:6px 12px; font-size:.78rem;}
.seq-done .ph{color:#a89e8a; font-size:.8rem; background:none;}
.kp{background:#fff; border-left:4px solid var(--gold); border-radius:10px; padding:12px 14px; margin-top:10px; font-size:.88rem; line-height:1.7;}
.kp b{color:var(--green);}
.summary{padding:8px 0;}
.ring{width:130px; height:130px; margin:18px auto 6px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--green-dark);}
.ring .p{font-size:1.9rem; font-weight:800;}
.ring .l{font-size:.72rem; color:#8a8272; letter-spacing:.15em;}
.sum-msg{text-align:center; font-size:.9rem; color:#5a5344; line-height:1.7; margin:8px 0 4px;}
.wrongitem{background:#fff; border-radius:12px; padding:12px 14px; margin-top:10px; font-size:.85rem; line-height:1.6; border:1px solid #eee2cf;}
.wrongitem .wq{font-weight:700; color:var(--green-dark);}
.wrongitem .wa{color:#5a5344; margin-top:6px;}
.wrongitem .wa b{color:var(--ok);}
.btns{margin-top:20px; display:flex; gap:10px;}
.btns button{flex:1; border-radius:14px; padding:13px; font-size:.92rem; font-weight:600; cursor:pointer; font-family:inherit;}
.btn-line{background:#fff; border:2px solid var(--green); color:var(--green);}
.btn-fill{background:var(--green); border:2px solid var(--green); color:#fff;}
.btn-red{background:#fff; border:2px solid var(--red); color:var(--red);}
.total-banner{background:var(--green-dark); color:#fff; border-radius:16px; padding:16px; margin-top:14px; text-align:center;}
.total-banner .t{font-size:.78rem; color:var(--gold); letter-spacing:.18em;}
.total-banner .v{font-size:1.45rem; font-weight:800; margin-top:4px;}
.total-banner .sub{font-size:.8rem; margin-top:4px; color:var(--milk);}
.wrongbook-entry{background:#fff; border-radius:14px; padding:14px; margin-top:10px; border:1px solid #eee2cf;}
.wrongbook-entry .tag{font-size:.7rem; color:var(--gold); font-weight:700;}
.wrongbook-entry .q{font-size:.9rem; font-weight:700; color:var(--green-dark); margin-top:4px; line-height:1.5;}
.wrongbook-entry .a{font-size:.82rem; color:#5a5344; margin-top:6px; line-height:1.6;}
.wrongbook-entry .a b{color:var(--ok);}
.wrongbook-entry .cnt{float:right; background:#faeae8; color:var(--red); border-radius:10px; padding:1px 8px; font-size:.7rem;}
.feedback-float{position:fixed; top:18%; left:50%; transform:translateX(-50%); background:rgba(31,77,58,.95); color:#fff; padding:12px 26px; border-radius:30px; font-size:1.05rem; font-weight:700; z-index:99; display:none; letter-spacing:.15em;}
.notice{background:#fdf6e8; border:1px dashed var(--gold); border-radius:12px; padding:10px 14px; font-size:.8rem; color:#8a7040; margin-top:14px; line-height:1.6; text-align:center;}
#gate{position:fixed; inset:0; background:var(--green-dark); z-index:999; display:flex; align-items:center; justify-content:center; padding:24px;}
#gate .box{max-width:340px; width:100%; text-align:center; color:#fff;}
#gate h2{letter-spacing:.2em; font-size:1.3rem;}
#gate p{color:var(--gold); font-size:.82rem; margin:10px 0 22px; line-height:1.7;}
#gate input{width:100%; border:none; border-radius:14px; padding:16px; font-size:1.2rem; text-align:center; letter-spacing:.4em; font-family:inherit; outline:none;}
#gate input.err{animation:shake .3s; box-shadow:0 0 0 3px var(--red);}
#gate button{width:100%; margin-top:14px; background:var(--gold); color:var(--green-dark); border:none; border-radius:14px; padding:14px; font-size:1rem; font-weight:700; letter-spacing:.15em; cursor:pointer; font-family:inherit;}
#gate .hint{font-size:.72rem; color:#8fa89a; margin-top:16px;}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <h2>吃茶三千 · 考核前練習</h2>
    <p>本工具僅供內部夥伴訓練使用<br>請輸入通行碼進入</p>
    <input type="password" id="gateInput" inputmode="numeric" autocomplete="off" placeholder="通行碼">
    <button id="gateBtn">進入練習</button>
    <div class="hint">通行碼請向你的訓練員索取</div>
  </div>
</div>
<header class="top">
  <h1>吃茶三千 · 考核前練習</h1>
  <p>練習模式 — 錯了沒關係，練到熟就好</p>
</header>

<div class="wrap">

<!-- ══════════ 首頁 ══════════ -->
<div class="screen active" id="home">
  <div class="total-banner">
    <div class="t">整 體 熟 練 度</div>
    <div class="v" id="totalPct">—</div>
    <div class="sub" id="totalMsg">完成各章練習，熟練度達 90% 再去找訓練員考核吧！</div>
  </div>
  <div class="card" id="wbCard" style="border:2px solid var(--red);">
    <div class="num" style="background:#faeae8; color:var(--red);">錯</div>
    <div class="info"><h3>我的錯題本</h3><p>累積答錯的題目，答對就會消掉</p></div>
    <div class="mastery"><span class="pct" id="wbCount" style="color:var(--red);">0</span><small>待複習</small></div>
  </div>
  <div id="menu"></div>
  <div class="notice">此工具僅供考核前自我練習，不記錄成績、不作為考核依據。<br>熟練度 = 每章「第一次就答對」的比例。</div>
</div>

<!-- ══════════ 章前重點速覽 ══════════ -->
<div class="screen" id="keypoints">
  <div class="gamebar">
    <button class="back" onclick="goHome()">← 回選單</button>
  </div>
  <div class="qtitle" id="kpChap"></div>
  <div class="qtext" id="kpName" style="margin-bottom:4px;"></div>
  <p style="font-size:.8rem; color:#8a8272;">練習前先看一遍重點，印象會更深：</p>
  <div id="kpList"></div>
  <button class="nextbtn show" id="kpStart" style="margin-top:20px;">開始練習 →</button>
</div>

<!-- ══════════ 練習畫面 ══════════ -->
<div class="screen" id="game">
  <div class="gamebar">
    <button class="back" onclick="goHome()">← 離開練習</button>
    <div class="phase" id="gPhase"></div>
  </div>
  <div class="progress"><i id="gProg"></i></div>
  <div id="stage"></div>
</div>

<!-- ══════════ 章節總結 ══════════ -->
<div class="screen" id="summary">
  <div class="summary" id="sumBody"></div>
</div>

<!-- ══════════ 錯題本 ══════════ -->
<div class="screen" id="wrongbook">
  <div class="gamebar">
    <button class="back" onclick="goHome()">← 回選單</button>
    <div class="phase">我的錯題本</div>
  </div>
  <div id="wbBody"></div>
</div>

</div>
<div class="feedback-float" id="fb"></div>

<script>
/* ═══════════════ 題庫（每題含 kind 與詳細解析 ex） ═══════════════ */

const CH=[
{ id:0, icon:"壹", name:"品牌快問快答", chap:"Chapter 1 品牌介紹與經營理念",
  desc:"品牌故事與三大經營理念",
  keypoints:[
   "<b>1998 年</b>，前身「喫茶小舖」誕生於<b>台灣台中西屯</b>；門店至今<b>二百餘家</b>。",
   "核心理念：<b>台灣茶、世界化</b>——從枝頭到杯盛、從台灣到國際。",
   "三大經營理念：<b>專業精神</b>（獨家萃茶機、現磨現萃）、<b>藝術空間</b>（2018 台中概念店）、<b>人文素養</b>（有溫度的服務）。",
   "人文素養：以<b>標準化為本</b>，但不讓服務變得制式化；專業是必須，有溫度的服務更是追求。"
  ],
  items:[
   {kind:"quiz", q:"吃茶三千的前身「喫茶小舖」誕生於哪一年、哪個城市？",
    opts:["1998年，台灣台中西屯","1998年，台灣台北","2008年，台灣台中西屯","1988年，台灣台南"],a:0,
    ex:"1998 年，前身「喫茶小舖」誕生於台灣台中西屯。從一間鄰里茶舖出發、專注做茶二十餘年，迄今門店達二百餘家，「一代人喝著我們的茶長大」。記憶點：一九九八・台中西屯。"},
   {kind:"quiz", q:"吃茶三千秉持的核心理念是？",
    opts:["台灣茶、世界化","世界茶、台灣化","台灣茶、在地化","東方茶、精品化"],a:0,
    ex:"核心理念是「台灣茶、世界化」——從枝頭到杯盛、從台灣到國際，把台灣最好的茶帶向世界。這句話也是向客人介紹品牌時最重要的一句。"},
   {kind:"quiz", q:"以下哪一項【不是】吃茶三千的三大經營理念之一？",
    opts:["科技管理","專業精神","藝術空間","人文素養"],a:0,
    ex:"三大經營理念是：專業精神（做好茶的功夫）、藝術空間（美的體驗）、人文素養（有溫度的服務）。「科技管理」不在其中——萃茶機等科技只是實現專業精神的工具，不是理念本身。"},
   {kind:"quiz", q:"「專業精神」中提到的獨家設備與做法是？",
    opts:["獨家萃茶機，每克茶葉秤量、現磨現萃","全自動泡茶機，一鍵出茶","中央工廠統一沖泡後配送","傳統大桶泡茶確保產量"],a:0,
    ex:"獨家打造萃茶機：將每一克茶葉小心秤量、經過上萬次來回測試，做到現磨現萃、杯杯量身訂製。這是向客人說明「為什麼我們的茶不一樣」的關鍵。"},
   {kind:"quiz", q:"吃茶三千的藝術空間概念店，創立時間與地點是？",
    opts:["2018年・台中","2018年・台北","1998年・台中","2020年・上海"],a:0,
    ex:"2018 年起於台中創立概念店。注意別和 1998（品牌前身誕生年）搞混：1998 喫茶小舖創立、2018 概念店開幕，相差二十年。"},
   {kind:"quiz", q:"關於「人文素養」的敘述，何者正確？",
    opts:["以標準化為本，但不讓服務變得制式化","服務完全依 SOP 執行即可，不需個人溫度","有溫度就好，不需要標準化基礎","話術背得越多，服務就越有溫度"],a:0,
    ex:"吃茶三千「以標準化為本」確保專業品質，但人文溫度不可被冷冰冰地 SOP 化。標準是底線、溫度是追求，兩者缺一不可——這是和一般連鎖品牌最大的差異。"},
   {kind:"quiz", q:"迄今吃茶三千（含前身）門店數約達？",
    opts:["二百餘家","一百餘家","三百餘家","五十餘家"],a:0,
    ex:"迄今門店達二百餘家。整組記憶：1998 年創立、做茶二十餘年、門店二百餘家。"},
   {kind:"quiz", q:"店內選用台灣特有種原木的原因是？",
    opts:["略帶香氣、保留天然紋理，營造藝術空間","造價便宜、方便大量採購","耐磨好清潔、使用年限長","供應商指定的統一建材"],a:0,
    ex:"台灣特有種原木略帶香氣、色澤深淺不一、保留天然紋理，是營造藝術空間不可或缺的角色，也呼應「取材台灣」的品牌精神。"},
   {kind:"quiz", q:"為什麼新名字取為「吃茶三千」？",
    opts:["取自「弱水三千，獨取一瓢而飲」，象徵專注做好茶這一件事","因為創始店曾提供三千種茶品","紀念第三千位到店的顧客","三位創辦人的名字各取一字"],a:0,
    ex:"取自「弱水三千，獨取一瓢而飲」——象徵術業專攻，專注把「茶」這一件事做到最好；加上勿忘初心、堅持用心，於是有了新名字「吃茶三千」。"},
   {kind:"quiz", q:"吃茶三千（含前身）專注做茶多久了？",
    opts:["二十餘年","十餘年","三十餘年","五年"],a:0,
    ex:"自 1998 年至今專注做茶二十餘年，這份「做茶二十年的功夫底氣」正是專業精神的來源。"},
   {kind:"quiz", q:"獨家萃茶機經過多少次測試才誕生？",
    opts:["上萬次來回測試","上百次測試","一千次測試","三次國際認證"],a:0,
    ex:"萃茶機經過上萬次來回測試，才能做到現磨現萃、杯杯量身訂製、全球風味統一。向客人介紹萃茶機時，可以強調這份講究。"},
   {kind:"quiz", q:"吃茶三千想從台灣帶給世界的是？",
    opts:["零時差的問候、零溫差的人情","零距離的服務、零失誤的品質","最快的出杯速度","最平價的茶飲"],a:0,
    ex:"「零時差的問候、零溫差的人情」——把台灣的人情味原汁原味帶到世界每一家門店，分享與傳遞一份幸福的愉悅體驗。"},
   {kind:"ox", s:"夥伴阿明認為：只要完全照 SOP 做，就是吃茶三千要的服務。", ok:false,
    ex:"不正確。SOP 只是基礎——吃茶三千追求「以標準化為本，但不讓服務制式化」的有溫度服務，目標是把品牌的靈魂交到顧客手上，而不是機械式執行流程。"},
   {kind:"ox", s:"吃茶三千的前身是 1998 年誕生的「喫茶小舖」。", ok:true,
    ex:"正確。1998 年於台中西屯誕生的「喫茶小舖」就是吃茶三千的前身，之後更名為「吃茶三千」。"},
   {kind:"quiz", q:"品牌對「茶」的堅持是？",
    opts:["以茶為本，對品質永不妥協","以量為本，追求快速展店","以低價取勝","以聯名話題為主"],a:0,
    ex:"以茶為本、對品質永不妥協，並且不曾停下腳步，持續找尋蘊藏在台灣這座島嶼最好的食材。"},
   {kind:"quiz", q:"「專業精神」想翻轉的既定印象是？",
    opts:["好茶不再只有傳統沖泡方法，讓台灣飲品成為世界精品","手搖飲只能是便宜飲料","泡茶一定要用茶壺","年輕人不懂喝茶"],a:0,
    ex:"透過萃茶機展現茶從茶樹開始的不同樣貌與調製方式——好茶不再只有傳統沖泡方法，翻轉既定印象，讓代表台灣的飲品成為世界的精品。"},
   {kind:"quiz", q:"概念店「挑高區」的特色是？",
    opts:["獨家烘茶區與大面落地窗景一覽無遺","設有水幕牆與茶文化博物館","提供包廂式泡茶座位","展示歷代茶具收藏"],a:0,
    ex:"挑高區是整棟建築視野最好的區域：獨家烘茶區與大面落地窗景一覽無遺，讓人物與空間產生對話，感受空間帶來的氣息。"},
   {kind:"quiz", q:"藝術空間希望顧客踏入店裡感受到什麼？",
    opts:["不只是茶店，而是可短暫放鬆、充滿藝術與美的心靈休憩所在","像回到傳統茶行的懷舊感","快速取餐的便利感","熱鬧喧騰的市集氛圍"],a:0,
    ex:"藝術空間的目標：讓每位踏入的顧客不只是來到一間茶店，而是進入一個可以短暫放鬆、充滿藝術與美的心靈休憩所在。"},
   {kind:"quiz", q:"「人文素養」的最終目標是？",
    opts:["把品牌的靈魂精準地交到顧客手上","把 SOP 背得滾瓜爛熟","讓每位夥伴話術一字不差","縮短每筆訂單的服務時間"],a:0,
    ex:"不同於一般以 SOP 作為工具的服務方式，人文素養的最終目標是「把品牌的靈魂精準地交到顧客手上」——不需過多言語，敏銳而充滿人文氣息的服務。"},
   {kind:"quiz", q:"「台灣茶、世界化」的完整描述是？",
    opts:["從枝頭到杯盛，從台灣到國際","從產地到餐桌，從亞洲到歐美","從茶園到工廠，從傳統到現代","從門市到電商，從實體到虛擬"],a:0,
    ex:"完整句子是「從枝頭到杯盛，從台灣到國際」——從一片茶葉到一杯茶、從台灣門店到世界據點，實現台灣茶世界化。"}

{ id:1, icon:"貳", name:"儀容檢查官", chap:"Chapter 2 服裝儀容與服務要領",
  desc:"合格／不合格情境判斷",
  keypoints:[
   "名牌別在<b>左上角</b>（男生：口袋上方）；襯衫紮進褲內、黑色合身褲、黑色運動鞋。",
   "長髮綁馬尾，側面高度<b>與眉毛平行</b>；髮色深色，勿挑染淺亮色。",
   "<b>不可戴眼鏡</b>（隱形眼鏡透明/自然色）；配件皆不可戴，<b>婚戒除外</b>；指甲不超過指尖肉 <b>0.1cm</b>。",
   "沒穿完整制服<b>不得進吧台</b>；工作區不可滑手機、吃東西。",
   "顧客抱怨：<b>不輕易承諾</b>、不爭辯，「不好意思，我請專人為您說明」。"
  ],
  items:[
   {kind:"ox", s:"小美把名牌別在圍裙左上角。", ok:true,
    ex:"合格。名牌統一別在左上角（男生則別在口袋上方），讓客人一眼就能認識為他服務的夥伴。"},
   {kind:"ox", s:"阿哲今天戴了手錶和手鍊上班，方便看時間。", ok:false,
    ex:"不合格。工作時不可佩戴耳環、戒指、手鍊、手錶等配件（唯一例外是婚戒），項鍊也不可外露——既是衛生考量，也避免刮傷器具或配件掉入飲品。"},
   {kind:"ox", s:"小婷長髮綁馬尾，側面馬尾高度與眉毛平行。", ok:true,
    ex:"合格。長髮須綁馬尾並梳理整齊，側面看馬尾高度與眉毛平行，呈現整齊俐落的專業形象。"},
   {kind:"ox", s:"小凱近視，今天直接戴黑框眼鏡上班。", ok:false,
    ex:"不合格。工作時不可戴眼鏡；近視請配戴隱形眼鏡，且顏色以透明或自然色為主。"},
   {kind:"ox", s:"小華襯衫紮進褲子，搭配黑色合身九分褲與黑色運動鞋。", ok:true,
    ex:"合格。標準穿著：吃茶三千襯衫（紮進褲內）、圍裙、領結、名牌、9-10 分黑色合身褲、黑色襪子、黑色運動鞋，內搭以深色為主。"},
   {kind:"ox", s:"小芸做了漂亮的水晶指甲來上班。", ok:false,
    ex:"不合格。指甲不可超過指尖肉 0.1cm、不可塗指甲油或做水晶指甲、不可有污垢——這是飲品作業的衛生底線。"},
   {kind:"ox", s:"客人抱怨飲品，小明立刻承諾「一定賠您十杯」。", ok:false,
    ex:"不合格。面對顧客抱怨或質疑（含電話），不輕易給承諾；但一旦承諾了（包含答應回電），就務必執行——這是「承諾」的服務精神。"},
   {kind:"ox", s:"客人提出質疑，小李回答：「不好意思，我請專人為您說明。」", ok:true,
    ex:"合格，標準示範。顧客提出質疑時先虛心接受、再向主管反應，不與顧客言詞爭辯；可以說「不好意思，我請專人為您說明」或「很抱歉，我馬上為您詢問」。"},
   {kind:"ox", s:"店裡不忙，小趙在工作區滑手機回訊息。", ok:false,
    ex:"不合格。進入工作區不可使用手機聊天或吃東西，無論忙不忙都要保持專業服務人員形象。"},
   {kind:"ox", s:"小林今天染了淺亮色挑染髮色，覺得很有型。", ok:false,
    ex:"不合格。髮色以深色為主，請勿挑染多色或染淺亮色，維持整體一致的專業形象。"},
   {kind:"ox", s:"小周沒穿圍裙，想先進吧台幫忙做兩杯。", ok:false,
    ex:"不合格。沒有穿著完整制服，不得進入吧台工作區；圍裙也只在工作區穿著。"},
   {kind:"ox", s:"已婚的小吳上班時戴著婚戒。", ok:true,
    ex:"合格。配件原則上一律不可佩戴，唯一的例外就是婚戒。"},
   {kind:"ox", s:"小美的領結鬆鬆的，露出襯衫第一顆扣子。", ok:false,
    ex:"不合格。領結的緊度必須蓋住襯衫第一顆扣子，太鬆露出扣子就不符規範。"},
   {kind:"ox", s:"男生小陳把圍裙蝴蝶結綁在左邊。", ok:true,
    ex:"合格。男生圍裙的蝴蝶結統一綁在左邊；圍裙鈕扣則向內扣至合身。"},
   {kind:"ox", s:"小張的襪子外露，穿的是白色運動襪。", ok:false,
    ex:"不合格。襪子若會外露，請以黑色為主，與黑褲、黑鞋維持整體一致。"},
   {kind:"ox", s:"天氣冷，小玲在襯衫裡加了深色內搭衣。", ok:true,
    ex:"合格。內搭衣以深色為主，避免淺色透出影響制服整體感。"},
   {kind:"ox", s:"短髮的小豪把兩側頭髮梳理整齊塞到耳後。", ok:true,
    ex:"合格。短髮需梳理整齊並將兩側頭髮塞至耳後，露出乾淨清爽的臉部線條。"},
   {kind:"ox", s:"小莉戴了藍色放大片隱形眼鏡上班。", ok:false,
    ex:"不合格。隱形眼鏡顏色應以透明或自然色為主，彩色放大片過於誇張、不符自然原則。"},
   {kind:"ox", s:"尖峰時段熟客想先拿飲料，小王就先做熟客的單。", ok:false,
    ex:"不合格。應按照顧客先後順序服務，熟客也不例外——插隊處理最容易引起其他顧客抱怨。"},
   {kind:"ox", s:"小安畫了自然好氣色的淡妝上班。", ok:true,
    ex:"合格。妝容以好氣色（眼妝、唇彩）與自然為原則，請勿過度誇張或濃妝。"}
  ]},

{ id:2, icon:"參", name:"櫃台情境模擬", chap:"Chapter 3 櫃台認識與教學",

   "奉飲：<b>右手托杯身、左手托杯底</b>，倒 <b>6-7 分滿</b>，時效 <b>1.5 小時</b>。",

   "聞香瓶：每天檢查香氣、<b>一週更換一次</b>。給杯：請顧客出示明細，核對<b>單號、飲品、杯數</b>。",

  items:[

   {kind:"quiz", q:"【情境】顧客踏出店外第一步，正確的招呼語是？",

   {kind:"quiz", q:"【情境】顧客走到櫃檯，你倒好奉飲，正確的給杯方式是？",
    opts:["右手托杯身、左手托杯底","左手托杯身、右手托杯底","雙手捧住杯口遞出","放在櫃檯請客人自取"],a:0,

   {kind:"quiz", q:"【情境】第一次來店的顧客不會點單，正確的介紹順序是？",

   {kind:"quiz", q:"【情境】顧客點單完畢，正確的下一步是？",

   {kind:"quiz", q:"【情境】聞香瓶的日常保養，何者正確？",

   {kind:"quiz", q:"【情境】做完杯送到出餐區，包杯前要核對哪些項目？",

   {kind:"quiz", q:"【情境】客人點了奶蓋慕思，給杯時的溫馨提醒是？",
    opts:["「慕思有 3 種喝法：先就口喝、再與茶一同品嚐、最後攪拌變奶茶」","「請先攪拌均勻再飲用喔」","「建議 30 分鐘內喝完喔」","「小心燙唷」"],a:0,
    ex:"奶蓋慕思的三段式喝法：第一口先就口品嚐慕思、第二步將慕思與茶一同品嚐、最後攪拌均勻又是一杯奶茶。注意分辨：「先攪拌均勻」是加料的提醒、「小心燙」是熱飲的提醒。"},
   {kind:"quiz", q:"【情境】叫號給杯時，正確流程是？",

    ex:"叫號「○○號，您的飲料好囉！」，請顧客出示明細，核對單號、飲品、杯數，確認無誤才給杯——三項都核對，才能避免拿錯、漏杯。"},
   {kind:"quiz", q:"【情境】綁繩杯套的規範，何者正確？",
    opts:["蝴蝶結下擺長度與杯套底部同長，麻繩 116cm","蝴蝶結下擺長度與杯身底部同長，麻繩 116cm","蝴蝶結綁緊即可，長度不拘","麻繩 161cm，下擺與杯套頂部同長"],a:0,
    ex:"綁繩規範兩條：蝴蝶結下擺長度須與「杯套底部」同長（不是杯身底部）；麻繩長 116cm、粗 2-2.5mm。"},
   {kind:"quiz", q:"奉飲的時效是多久？",
    opts:["1.5 小時","3 小時","30 分鐘","1 天"],a:0,
    ex:"奉飲時效為 1.5 小時，到期就要重新製作——奉飲是客人對品牌的第一口，品質必須跟正式飲品一樣。"},
   {kind:"quiz", q:"奉飲要倒幾分滿？",
    opts:["6-7 分滿","全滿","5 分滿","8-9 分滿"],a:0,
    ex:"奉飲倒 6-7 分滿：太滿容易灑出燙手、太少顯得小氣，6-7 分是奉茶的禮儀比例。"},
   {kind:"quiz", q:"菜單上的基底茶如何區分？",
    opts:["上面三款淺色茶較清爽、下面三款深色茶茶味較濃厚","上面三款深色茶、下面三款淺色茶","依價格由低到高排列","依甜度由低到高排列"],a:0,
    ex:"菜單上面三款為淺色茶（清爽、適合搭果茶），下面三款為深色茶（濃厚、適合搭奶茶）——這也是點單介紹話術的開場：「上面三款喝起來較清爽，下面三款茶味較濃厚」。"},
   {kind:"quiz", q:"現金結帳時收到大鈔，正確做法是？",
    opts:["使用驗鈔機，有疑問時做複驗","確認圖案沒問題直接收下","一律拒收大鈔","請客人到超商換零錢"],a:0,

    opts:["梨山烏龍茶・台中梨山產區","凍頂烏龍・南投鹿谷","高山金萱・嘉義梅山","大禹嶺烏龍・南投"],a:0,
    ex:"品鑑區使用台中梨山產區的梨山烏龍茶，海拔 2000-2200 公尺，是台灣海拔最高的產茶區之一（客人問「哪個梨山」時，答案是台中市的梨山茶區）。烏龍茶是台灣最具代表性的茶種。"},
   {kind:"quiz", q:"國際品茗標準的沖泡比例是？",
    opts:["3 克茶葉・95°C・靜置 6 分鐘","3 克茶葉・100°C・靜置 6 分鐘","5 克茶葉・95°C・靜置 5 分鐘","3 克茶葉・95°C・靜置 3 分鐘"],a:0,
    ex:"標準比例：3 克茶葉、120c.c. 水量、95 度熱水、靜置 6 分鐘——這是國際茶葉評鑑比賽的標準，也是針對梨山烏龍與五款焙度反覆測試後，茶湯表現最好的完美比例。四個數字要一起背。"},
   {kind:"quiz", q:"為什麼選用白瓷評鑑杯組？",
    opts:["毛細孔小、保溫佳，香氣不殘留到下一泡","白瓷導熱快，能快速降溫方便品飲","白色能觀察茶葉舒展程度","國際標準規定必須使用白瓷"],a:0,
    ex:"白瓷評鑑杯毛細孔極小、保溫效果好：能完整呈現茶香與風味，而且清洗後香氣不會殘留到下一次沖泡。這是國際茶葉評鑑比賽使用的標準評鑑杯組。"},
   {kind:"quiz", q:"梨山烏龍茶的採收方式是？",
    opts:["春冬兩季各一次・手工採一心二葉","春秋兩季各一次・手工採一心一葉","一年四季皆可採・機器輔助","夏冬兩季各一次・機器採收"],a:0,
    ex:"梨山烏龍屬小葉種、枝芽細小，加上高山崎嶇地形機器無法作業，必須手工採摘一心二葉；一年只採春、冬兩季，因此格外稀有珍貴——這是向客人強調價值的重點。"},
   {kind:"quiz", q:"客人說「你們的茶很好喝，我可以多喝幾杯嗎？」正確回應是？",
    opts:["說明是個人一次性沖茶體驗，引導至商品展示區選購","再幫客人沖一杯較淡的焙度","請客人到櫃台加購品鑑券","委婉說今日茶葉已用完"],a:0,
    ex:"標準話術：「今天的分享屬於個人一次性沖茶體驗，如果喜歡我們的茶，可以到商品展示區選購小包裝茶葉，回家自行沖泡呦！」品鑑的任務是體驗＋導購，不是續杯服務。回沖需求也用同樣邏輯回應：現場比例設定在第一泡就有最好的表現。"},
   {kind:"quiz", q:"溫杯的目的為何？",
    opts:["避免溫差過大影響茶湯風味","高溫消毒杯具確保衛生","讓杯身變熱方便客人辨識","軟化白瓷毛細孔釋放香氣"],a:0,
    ex:"溫杯是避免滾燙熱水沖入冰冷茶杯時，因溫度落差太大影響茶湯風味。雖是小動作，卻是確保茶湯品質的必要因素——解說時記得把這段話術帶給客人，展現專業。"},
   {kind:"quiz", q:"高山（2000 公尺以上）環境對茶葉的影響是？",
    opts:["雲霧籠罩、日夜溫差大，提高葉綠素與胺基酸含量","日照強烈，使茶葉纖維更粗壯","低溫使茶葉生長快、葉片大","高山雨量多，茶味自然較淡"],a:0,
    ex:"高山終年雲霧籠罩、日夜溫差大，提高了葉綠素與胺基酸含量：葉綠素讓茶葉色澤更亮，胺基酸讓茶湯喝起來鮮、爽、甜——這就是梨山茶好喝的科學原因，也是話術裡的必講段落。"},
   {kind:"seq", title:"五款焙度名稱（如太陽軌跡，由輕到重）",
    steps:["初曉","晨曦","朝日","暮霞","夜闌"],
    ex:"由輕到重：初曉（朦朦微亮，茶農開始忙碌的一天）→ 晨曦（太陽漸升）→ 朝日（正午烈日）→ 暮霞（夕陽西下）→ 夜闌（夜深）。名字象徵茶農日出而作、日落而息的一天，講給客人聽是很動人的品牌故事。"},
   {kind:"seq", title:"茶葉製程八步驟",
    steps:["採摘","日光萎凋","室內萎凋","浪菁","發酵","炒菁","揉捻","乾燥"],
    ex:"八步驟：採摘 → 日光萎凋（室外蒸發水分）→ 室內萎凋（持續失水並產生化學變化、發揮高山香氣）→ 浪菁（攪拌均勻）→ 發酵（茶多酚氧化）→ 炒菁（高溫停止發酵、葉片變軟）→ 揉捻（破壞細胞結構讓汁液附著表面、增添風味）→ 乾燥（含水量 3-5%，成為毛茶）。"},
   {kind:"quiz", q:"秤茶的規範是？",
    opts:["兩次內秤好；多秤的茶葉以木夾夾至容器，勿放回茶罐","慢慢秤到剛好 3 克為止","多的茶葉直接倒回茶罐","多的茶葉直接丟棄"],a:0,
    ex:"需在兩次內把 3 克茶葉秤好（動作要俐落專業）；不慎多秤時，多餘茶葉用乾淨木夾夾到容器中（之後作教育訓練或茶牆用途），切勿放回茶罐——避免手觸污染整罐茶。"},
   {kind:"quiz", q:"品鑑沖茶的水量是？",
    opts:["120 c.c.","150 c.c.","100 c.c.","200 c.c."],a:0,
    ex:"沖茶水量 120c.c.。四個數字一組記：3 克茶葉、120c.c.、95 度、6 分鐘。注水時沿杯壁讓茶葉均勻滾動受熱，注完蓋上杯蓋開始計時，並把水壺補水至注水線避免乾燒。"},
   {kind:"quiz", q:"春茶與冬茶的差異，何者正確？",
    opts:["春茶約 5 月採收、香氣明顯；冬茶約 11 月採收、茶韻厚實","春茶約 11 月採收；冬茶約 5 月採收","春茶茶韻厚實；冬茶香氣明顯","兩者無差異"],a:0,
    ex:"春茶：冬天生長、春天採收（約 5 月），香氣明顯、滋味清爽香甜，市場價格較高；冬茶：約 11 月採收，茶韻厚實、香氣較淡但柔順細膩。採茶配合農曆節氣進行。"},
   {kind:"quiz", q:"「一心二葉」的一心（嫩芽）富含什麼？",
    opts:["多酚、胺基酸，是甘味的來源","醣類和香氣物質，是甜味來源","纖維質與礦物質","咖啡因與茶鹼"],a:0,
    ex:"一心（嫩芽）富含多酚與胺基酸，是「甘味」來源；二葉（嫩葉）富含醣類和香氣物質，是「甜味與香氣」來源。手工採收帶少許茶梗是正常的——茶梗是香氣來源，也是茶葉的精華。"},
   {kind:"quiz", q:"品鑑區泡茶用的水是？",
    opts:["過濾水（軟水），較能呈現茶湯的色、香、味","山泉水（硬水）","蒸餾水","一般自來水"],a:0,
    ex:"使用過濾水——過濾掉礦物質後屬於「軟水」，用軟水泡茶較能呈現茶湯的色、香、味。客人說平常用山泉水泡茶時，就用這段說明回應。"},
   {kind:"quiz", q:"烘焙時間與咖啡因的關係是？",
    opts:["烘焙越長咖啡因越少，故重烘焙咖啡因最少","烘焙越長咖啡因越多","兩者無關","只與海拔高度有關"],a:0,
    ex:"咖啡因會因長時間高溫焙火而昇華減少，所以烘焙越長咖啡因越少——梨山烏龍五款焙度中，重烘焙「夜闌」的咖啡因最少，適合推薦給怕影響睡眠的客人。"},
   {kind:"quiz", q:"兒茶素含量的排序是？",
    opts:["綠茶＞烏龍茶＞紅茶（發酵越久含量越低）","紅茶＞烏龍茶＞綠茶","三者相同","烏龍茶最高"],a:0,
    ex:"發酵越久兒茶素越低：綠茶（不發酵）＞烏龍茶（半發酵）＞紅茶（全發酵）；海拔越高兒茶素也會遞減。補充：兒茶素越高，越能抑制咖啡因在胃部被吸收。"},
   {kind:"quiz", q:"乾燥後的茶葉稱為什麼？",
    opts:["毛茶","粗茶","初茶","生茶"],a:0,
    ex:"茶葉乾燥至含水量 3%-5% 後稱為「毛茶」——減少微生物生長並固定形狀、利於保存運送。毛茶之後送自家茶廠以電烤爐（密閉式、熱氣循環穩定）烘焙成五款焙度。"},
   {kind:"quiz", q:"櫃台與品鑑區用茶的差異是？",
    opts:["櫃台是六款基底茶客製化；品鑑區是單一梨山烏龍烘製五種焙度","兩邊用的茶完全相同","品鑑區使用進口茶種","櫃台使用茶包沖泡"],a:0,
    ex:"櫃台：六款不同風味的基底茶做客製化呈現；品鑑區：單一「梨山烏龍茶」獨家烘製五種烘焙程度——兩邊是不一樣的。這是客人最常問的 Q&A 之一，要能流暢回答。"},
   {kind:"ox", s:"擺放品鑑茶碗時，小美把茶碗 LOGO 正對客人。", ok:true,
    ex:"正確。約剩 1 分鐘時拿起品鑑茶碗擦拭、定位於不鏽鋼條旁，茶碗 LOGO 需正對客人——每個細節都朝向客人，是展演專業感的一部分。"}
  ]},

   {kind:"short", q:"品鑑區所使用茶葉的品種及產區為何？",

   {kind:"short", q:"沖茶前需備妥哪些用品？",

   {kind:"short", q:"沖茶所使用的茶葉克數、水量、靜置時間為多少？這樣的比例是如何制定的？",

   {kind:"short", q:"沖茶使用的熱水溫度為多少？用此溫度的原因是？",

   {kind:"short", q:"為什麼選用白瓷杯？白瓷杯有什麼特點？",
    ex:"這是國際評鑑使用的標準評鑑茶杯組。白瓷保溫效果好、毛孔極小，能完整保留茶湯的香氣和風味；簡單用清水沖洗就乾淨，不會與下一次沖泡的茶葉味道混合。"},
   {kind:"short", q:"請說明茶葉生長環境及背景。",
    ex:"海拔 2000-2200 公尺梨山產區，終年雲霧繚繞、日夜溫差大、土質肥沃，提升了茶葉中胺基酸與葉綠素的含量，造就茶湯甘甜順口、葉片厚實，並富含獨特的高山清香韻。記憶架構：環境三條件 → 兩種成分提升 → 三個風味結果。"},
   {kind:"short", q:"請針對梨山烏龍茶種做介紹。",
    ex:"梨山烏龍屬於小葉種，一年只在春、冬兩季採收，茶葉（枝芽）細小，全部以純手工方式採摘（一心二葉），因此稀有珍貴。"},
   {kind:"short", q:"為何選用梨山烏龍茶來烘焙？",
    ex:"因為它是台灣烏龍茶的代表，且茶葉延展性佳——同一支茶能烘出五款不同風味，展現最大的延展性與多變樣貌。"},
   {kind:"short", q:"店內共提供幾種烘焙程度？分別的命名為何？命名的原因？",
    ex:"五款：初曉、晨曦、朝日、暮霞、夜闌（由輕到重）。命名原因：茶葉烘焙程度不同、顏色如太陽日出至日落的變化，也象徵茶農天還未亮就出門採茶、直到夜幕降臨的辛勤意象。"},
   {kind:"short", q:"品茶的重要三元素為何？",
    ex:"香、甜、韻。品茗時引導客人依序感受：茶香 → 茶甜 → 茶韻（回甘與後韻）。"},
   {kind:"short", q:"請顧客用手觸摸茶葉的原因為何？",
    ex:"讓客人感受茶葉吸飽水的濕潤度，以及茶葉的厚實度——用觸覺體驗高山茶葉片厚實的特色。"},
   {kind:"short", q:"請敘述五款烘焙程度的茶特色。",
    ex:"初曉：保有茶葉最原始的風味，能喝到清香及高山韻。晨曦：甘甜感較明顯，帶淡淡烤焙香。朝日：香、甜、韻最均衡的焙度。暮霞：炭焙香氣最明顯，韻味較濃烈。夜闌：茶韻明顯，回甘強烈。順口溜：原始→甘甜→均衡→炭焙→回甘。"},
   {kind:"short", q:"【Q&A】客人問：「我可以再喝喝看其他的烘焙程度嗎？」",
    ex:"「先生/小姐你好，我們今天的分享是屬於個人一次性的沖茶體驗！如果喜歡今天體驗的茶品，可以到商品展示區選購，我們有提供茶葉及茶包，可以依您的泡茶習慣，回家自行沖泡呦！」重點：一次性體驗＋引導展示區。"},
   {kind:"short", q:"【Q&A】客人問：「這些茶葉只能沖泡一次嗎？可以再回沖嗎？」",
    ex:"「在品鑑區為了提供個人一次性最好的沖茶體驗，我們把比例設定在第一泡即有最好的品質展現，故不建議做二次回沖喔！若是您有購買茶葉或茶包，可依據您的喜好做調整哦！」重點：第一泡即最佳＋購買後可自行調整。"},
   {kind:"short", q:"【Q&A】客人問：「我在家沒有泡過茶，回去要怎麼泡才會泡得這麼好喝？」",
    ex:"「茶葉的部分，可參考我們使用的比例：3 克茶葉、120-150c.c.、95 度 C 的熱水，靜置 6 分鐘。茶包的部分我們有附上指示卡，提供您參考。」另外也有提供個人沖泡組，依指示卡操作就能泡出一樣的風味。"},
   {kind:"short", q:"【Q&A】客人問：「你們用的水是什麼水？我平常都用山泉水泡茶的耶！」",
    ex:"「我們使用的是過濾水，屬於軟水。使用軟水泡茶，較能呈現茶湯的色、香、味。」不需否定客人的習慣，說明軟水的優點即可。"},
   {kind:"short", q:"【Q&A】客人問：「你們櫃檯也是賣這個茶嗎？兩邊有什麼不同？」",
    ex:"「櫃檯是採用六種不同風味的茶做客製化呈現，而品鑑區這邊是以單一一款『梨山烏龍茶』獨家烘製五種烘焙程度，是不一樣的哦！」重點對比：櫃檯六款客製 vs 品鑑單一茶五焙度。"},
   {kind:"short", q:"【Q&A】客人問：「你最推薦哪個烘焙程度？」",
    ex:"先問客人：「每個人喜好不一，請問平常習慣喝什麼茶呢？」再依喜好推薦——習慣喝淺茶推「晨曦」（梨山烏龍的特性最能在輕中烘焙表現出來）；喜歡茶韻明顯、烤焙香重推重烘焙「夜闌」。初次接觸烏龍茶者也可用這組推薦。"},
   {kind:"short", q:"【Q&A】客人問：「什麼是茶葉胺基酸呢？」",
    ex:"「胺基酸是茶葉香氣及鮮爽度的重要成分，可以抑制茶湯的苦澀味；茶葉中胺基酸含量較高，口感就會表現出鮮、爽、甜。」"},
   {kind:"short", q:"【Q&A】客人問：「什麼是葉綠素呢？」",
    ex:"「葉綠素是形成茶葉外形和葉底色澤的重要因素。梨山海拔高、日照時間短，造就茶葉葉綠素含量高，所以茶葉鮮綠、茶湯色澤佳。」"},
   {kind:"short", q:"【Q&A】客人問：「什麼是國際茶葉評鑑？」",
    ex:"「國際茶葉評鑑是由國際標準組織（ISO）所制定的標準，其中詳細說明了標準化的泡茶方法。」我們的 3 克／120c.c.／95 度／6 分鐘就是依此標準。"}
  ]}
];

/* ═══════════════ 狀態儲存 ═══════════════ */
let store={mastery:{}, wrong:{}};
try{ const s=localStorage.getItem("tea3000_train"); if(s) store=JSON.parse(s); }catch(e){}
function save(){ try{ localStorage.setItem("tea3000_train", JSON.stringify(store)); }catch(e){} }
const qid=(ch,i)=>ch+":"+i;

/* ═══════════════ 工具 ═══════════════ */
const $=id=>document.getElementById(id);
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); $(id).classList.add("active"); window.scrollTo(0,0); }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function float(msg,color){ const f=$("fb"); f.textContent=msg; f.style.background=color; f.style.display="block"; clearTimeout(f._t); f._t=setTimeout(()=>f.style.display="none",750); }
const good=()=>float("答對了！","rgba(62,142,95,.95)");
const bad =()=>float("沒關係，記起來！","rgba(192,86,74,.95)");

/* ═══════════════ 首頁 ═══════════════ */
function renderHome(){
  const menu=$("menu"); menu.innerHTML="";
  let sum=0, done=0;
  CH.forEach(ch=>{
    const m=store.mastery[ch.id];
    if(m!==undefined){ sum+=m; done++; }
    const wrongN=Object.keys(store.wrong).filter(k=>+k.split(":")[0]===ch.id).length;
    const d=document.createElement("div");
    d.className="card"; d.onclick=()=>openKeypoints(ch.id);
    d.innerHTML=`<div class="num">${ch.icon}</div>
      <div class="info"><h3>${ch.name}</h3><p>${ch.chap}</p><span class="badge">${ch.desc}</span></div>
      <div class="mastery">
        <span class="pct ${m>=90?"hi":""}">${m===undefined?"—":m+"%"}</span>
        <small>${m===undefined?"尚未練習":"熟練度"}</small>
        ${wrongN?`<span class="wrongtag">錯題 ${wrongN}</span>`:""}
      </div>`;
    menu.appendChild(d);
  });
  const wbN=Object.keys(store.wrong).length;
  $("wbCount").textContent=wbN;
  $("wbCard").style.display = wbN? "flex":"none";
  $("wbCard").onclick=renderWrongBook;
  if(done===0){ $("totalPct").textContent="—"; $("totalMsg").textContent="完成各章練習，熟練度達 90% 再去找訓練員考核吧！"; }
  else{
    const avg=Math.round(sum/CH.length);
    $("totalPct").textContent=avg+"%";
    $("totalMsg").textContent = (done<CH.length)? `已練習 ${done}/${CH.length} 單元，繼續加油！`
      : avg>=90? "全部單元皆熟練，可以安排考核了！" : "全部練過一輪了，把錯題本清空更穩！";
  }
  show("home");
}
const goHome=renderHome;

/* ═══════════════ 章前重點速覽 ═══════════════ */
function openKeypoints(id){
  const ch=CH[id];
  $("kpChap").textContent=ch.chap;
  $("kpName").textContent=ch.name;
  $("kpList").innerHTML=ch.keypoints.map(k=>`<div class="kp">${k}</div>`).join("");
  $("kpStart").onclick=()=>beginPractice(id);
  show("keypoints");
}

/* ═══════════════ 練習引擎 ═══════════════ */
let S=null; // session
function beginPractice(id){
  S={chId:id, mode:"chapter", queue:shuffle(CH[id].items.map((_,i)=>i)), pos:0,
     phase:"main", retry:[], firstTry:{}, totalMain:CH[id].items.length};
  show("game"); step();
}
function step(){
  if(S.pos>=S.queue.length){
    if(S.phase==="main" && S.retry.length){
      S.phase="retry"; S.queue=[...new Set(S.retry)]; S.retry=[]; S.pos=0;
      return interstitial();
    }
    if(S.phase==="retry" && S.retry.length){
      S.queue=[...new Set(S.retry)]; S.retry=[]; S.pos=0;
      return step();
    }
    return endChapter();
  }
  const ch=CH[S.chId], idx=S.queue[S.pos], item=ch.items[idx];
  $("gPhase").textContent = S.phase==="main"? `練習中 ${S.pos+1}/${S.queue.length}` : `錯題加強 ${S.pos+1}/${S.queue.length}`;
  $("gPhase").className = "phase"+(S.phase==="retry"?" retry":"");
  $("gProg").style.width=(S.pos/S.queue.length*100)+"%";
  renderItem(ch, item, idx, correct=>{
    if(S.phase==="main"){
      S.firstTry[idx]=correct;
      if(!correct) S.retry.push(idx);
    } else if(!correct) S.retry.push(idx);
    S.pos++; step();
  });
}
function interstitial(){
  $("gProg").style.width="100%";
  $("stage").innerHTML=`
    <div style="text-align:center; padding:40px 10px;">
      <div style="font-size:2.6rem;">🔁</div>
      <div class="qtext" style="margin-top:12px;">錯題加強回合</div>
      <p style="font-size:.88rem; color:#8a8272; line-height:1.7;">剛剛答錯的 ${S.queue.length} 題會再出現一次，<br>答對才算完成——這就是加深印象的關鍵！</p>
      <button class="nextbtn show" onclick="step()">開始加強 →</button>
    </div>`;
}

/* ─── 單題渲染（依 kind 分派，答完呼叫 onDone(correct)） ─── */
function renderItem(ch, item, idx, onDone){
  const st=$("stage");
  const head=`<div class="qtitle">${ch.chap}</div>`;
  const exBox=`<div class="explain" id="ex"><b>解析：</b>${item.ex||""}</div>
    <button class="nextbtn" id="nx">繼續 →</button>`;

  if(item.kind==="short"){
    st.innerHTML=head+`<div class="qtext">${item.q}</div>
      <div class="notice" style="text-align:left; margin-top:0;">🎤 口說練習：先像面對訓練員一樣，<b>大聲說出</b>你的答案，說完再對照參考答案。</div>
      <button class="nextbtn show" id="reveal">說完了，看參考答案 →</button>
      <div class="explain" id="ex"><b>參考答案：</b>${item.ex}</div>
      <div class="oxrow" id="selfrow" style="display:none; margin-top:14px;">
        <button class="okbtn" id="sOK">✓ 有答出重點</button>
        <button class="ngbtn" id="sNG">✗ 還不熟</button>
      </div>
      <p id="selfhint" style="display:none; font-size:.75rem; color:#a89e8a; text-align:center; margin-top:8px;">誠實自評才有效——選「還不熟」的題目稍後會再練一次。</p>`;
    $("reveal").onclick=()=>{
      $("reveal").style.display="none";
      $("ex").classList.add("show");
      $("selfrow").style.display="flex";
      $("selfhint").style.display="block";
    };
    $("sOK").onclick=()=>{ good(); onDone(true); };
    $("sNG").onclick=()=>{ bad(); onDone(false); };

  } else if(item.kind==="quiz"){
    st.innerHTML=head+`<div class="qtext">${item.q}</div><div id="opts"></div>`+exBox;
    const box=$("opts");
    shuffle(item.opts.map((o,i)=>({o,i}))).forEach(({o,i})=>{
      const b=document.createElement("button"); b.className="opt"; b.textContent=o;
      b.onclick=()=>{
        box.querySelectorAll("button").forEach(x=>x.disabled=true);
        const correct=(i===item.a);
        if(correct){ b.classList.add("correct"); good(); }
        else{ b.classList.add("wrong"); bad();
          box.querySelectorAll("button").forEach(x=>{ if(x.textContent===item.opts[item.a]) x.classList.add("correct"); }); }
        $("ex").classList.add("show"); $("nx").classList.add("show");
        $("nx").onclick=()=>onDone(correct);
      };
      box.appendChild(b);
    });

  } else if(item.kind==="ox"){
    st.innerHTML=head+`<div class="statement">${item.s}</div>
      <div class="oxrow"><button class="okbtn" id="bOK">✓ 合格</button><button class="ngbtn" id="bNG">✗ 不合格</button></div>`+exBox;
    const ans=v=>{
      $("bOK").disabled=$("bNG").disabled=true;
      const correct=(v===item.ok);
      correct? good():bad();
      $(v?"bOK":"bNG").style.outline= correct? "3px solid var(--ok)":"3px solid var(--red)";
      $("ex").classList.add("show"); $("nx").classList.add("show");
      $("nx").onclick=()=>onDone(correct);
    };
    $("bOK").onclick=()=>ans(true); $("bNG").onclick=()=>ans(false);

  } else if(item.kind==="bin"){
    st.innerHTML=head+`<div class="itemcard">${item.item}<small>${item.hint}</small></div><div class="binrow" id="bins"></div>`+exBox;
    const bins=$("bins");
    ch.bins.forEach((b,i)=>{
      const btn=document.createElement("button"); btn.textContent=b;
      btn.onclick=()=>{
        bins.querySelectorAll("button").forEach(x=>x.disabled=true);
        const correct=(i===item.a);
        if(correct){ btn.classList.add("correct"); good(); }
        else{ btn.classList.add("wrong"); bad(); bins.querySelectorAll("button")[item.a].classList.add("correct"); }
        $("ex").classList.add("show"); $("nx").classList.add("show");
        $("nx").onclick=()=>onDone(correct);
      };
      bins.appendChild(btn);
    });

  } else if(item.kind==="seq"){
    st.innerHTML=head+`<div class="qtext">${item.title}｜依正確順序點選步驟</div>
      <div class="seq-done" id="done"><span class="ph">← 點選下方步驟，依序排入這裡</span></div>
      <div class="seq-pool" id="pool"></div>`+exBox;
    let pos=0, miss=0;
    const pool=$("pool");
    shuffle(item.steps.map((s,i)=>({s,i}))).forEach(({s,i})=>{
      const b=document.createElement("button"); b.textContent=s;
      b.onclick=()=>{
        if(i===pos){
          b.classList.add("used");
          if(pos===0)$("done").innerHTML="";
          const t=document.createElement("span"); t.textContent=(pos+1)+". "+s; $("done").appendChild(t);
          pos++;
          if(pos===item.steps.length){
            const correct=(miss===0);
            correct? good():float("完成！但有錯誤，會再練一次","rgba(201,160,90,.95)");
            $("ex").classList.add("show"); $("nx").classList.add("show");
            $("nx").onclick=()=>onDone(correct);
          }
        } else { miss++; b.classList.add("shake"); setTimeout(()=>b.classList.remove("shake"),350); bad(); }
      };
      pool.appendChild(b);
    });

  } else if(item.kind==="match"){
    st.innerHTML=head+`<div class="qtext">${item.title}｜先點左邊，再點右邊對應答案</div>
      <div class="match-area"><div class="match-col" id="colL"></div><div class="match-col" id="colR"></div></div>`+exBox;
    let sel=null, remain=item.pairs.length, miss=0;
    const L=$("colL"), R=$("colR");
    shuffle(item.pairs.map((p,i)=>({t:p[0],i}))).forEach(({t,i})=>{
      const b=document.createElement("button"); b.className="mcard"; b.textContent=t;
      b.onclick=()=>{ if(b.classList.contains("done"))return;
        L.querySelectorAll(".mcard").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel"); sel={btn:b,i}; };
      L.appendChild(b);
    });
    shuffle(item.pairs.map((p,i)=>({t:p[1],i}))).forEach(({t,i})=>{
      const b=document.createElement("button"); b.className="mcard"; b.textContent=t;
      b.onclick=()=>{
        if(b.classList.contains("done")||!sel) return;
        if(sel.i===i){
          b.classList.add("done"); sel.btn.classList.add("done"); sel.btn.classList.remove("sel"); sel=null; remain--; good();
          if(remain===0){
            const correct=(miss===0);
            if(!correct) float("完成！但有配錯，會再練一次","rgba(201,160,90,.95)");
            $("ex").classList.add("show"); $("nx").classList.add("show");
            $("nx").onclick=()=>onDone(correct);
          }
        } else { miss++; b.classList.add("shake"); setTimeout(()=>b.classList.remove("shake"),350); bad(); }
      };
      R.appendChild(b);
    });
  }
}

/* ═══════════════ 章節總結 ═══════════════ */
function endChapter(){
  const ch=CH[S.chId];
  const total=S.totalMain;
  const firstOK=Object.values(S.firstTry).filter(Boolean).length;
  const pct=Math.round(firstOK/total*100);
  store.mastery[S.chId]=pct;
  ch.items.forEach((_,i)=>{
    const id=qid(S.chId,i);
    if(S.firstTry[i]===true) delete store.wrong[id];
    else if(S.firstTry[i]===false) store.wrong[id]={c:((store.wrong[id]||{}).c||0)+1, t:Date.now()};
  });
  save();
  const wrongIdx=ch.items.map((_,i)=>i).filter(i=>S.firstTry[i]===false);
  const color= pct>=90? "var(--ok)": pct>=70? "var(--gold)":"var(--red)";
  $("sumBody").innerHTML=`
    <div style="text-align:center;">
      <div class="qtitle" style="margin-top:14px;">${ch.chap}</div>
      <div class="ring" style="background:conic-gradient(${color} ${pct*3.6}deg, var(--milk) 0deg);">
        <div style="width:104px;height:104px;border-radius:50%;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span class="p">${pct}%</span><span class="l">熟練度</span>
        </div>
      </div>
      <p class="sum-msg">${
        pct>=90? "非常熟練！這一章可以放心接受考核了 💪"
        : pct>=70? "大致掌握了！再把下面幾題的解析多看幾遍會更穩。"
        : "還不夠熟，建議回「重點速覽」再看一遍，多練幾輪加深印象。"}</p>
      <p class="sum-msg" style="font-size:.78rem; color:#a89e8a;">（錯過的題目剛剛都已重練到答對，也存入錯題本囉）</p>
    </div>
    ${wrongIdx.length? `<div class="qtitle" style="margin-top:18px;">本輪答錯 ${wrongIdx.length} 題・解析再看一遍：</div>`
      + wrongIdx.map(i=>{const it=ch.items[i]; return `<div class="wrongitem">
          <div class="wq">${it.q||it.s||it.item||it.title}</div>
          <div class="wa"><b>✔</b> ${it.ex}</div></div>`;}).join("")
      : `<div class="notice">全部第一次就答對，太強了！</div>`}
    <div class="btns">
      <button class="btn-line" onclick="beginPractice(${S.chId})">再練一輪</button>
      <button class="btn-fill" onclick="goHome()">回選單</button>
    </div>`;
  show("summary");
}

/* ═══════════════ 錯題本 ═══════════════ */
function renderWrongBook(){
  const ids=Object.keys(store.wrong);
  const body=$("wbBody");
  if(!ids.length){
    body.innerHTML=`<div style="text-align:center; padding:50px 10px;">
      <div style="font-size:2.6rem;">🎉</div>
      <div class="qtext" style="margin-top:12px;">錯題本是空的！</div>
      <p style="font-size:.85rem;color:#8a8272;">目前沒有待複習的題目，繼續保持。</p>
      <button class="nextbtn show" onclick="goHome()">回選單</button></div>`;
    return show("wrongbook");
  }
  const sorted=ids.map(getItemSafe).filter(Boolean).sort((a,b)=>a.chId-b.chId);
  body.innerHTML=`
    <p style="font-size:.82rem; color:#8a8272; margin-top:4px; line-height:1.6;">共 ${sorted.length} 題待複習。可先看解析回想，再按下方「重練錯題」實際測自己——答對就會從錯題本移除。</p>
    ${sorted.map(({ch,item,cnt})=>`
      <div class="wrongbook-entry">
        <span class="cnt">錯 ${cnt} 次</span>
        <div class="tag">${ch.chap}</div>
        <div class="q">${item.q||item.s||item.item||item.title}</div>
        <div class="a"><b>✔</b> ${item.ex}</div>
      </div>`).join("")}
    <div class="btns">
      <button class="btn-red" onclick="if(confirm('確定清空錯題本？')){store.wrong={};save();renderWrongBook();}">清空</button>
      <button class="btn-fill" onclick="startDrill()">重練錯題 →</button>
    </div>`;
  show("wrongbook");
}
function getItemSafe(id){
  const [c,i]=id.split(":").map(Number);
  if(!CH[c]||!CH[c].items[i]) return null;
  return {ch:CH[c], item:CH[c].items[i], chId:c, idx:i, id, cnt:store.wrong[id].c};
}
function startDrill(){
  const ids=Object.keys(store.wrong).map(getItemSafe).filter(Boolean);
  if(!ids.length) return;
  S={mode:"drill", list:shuffle(ids.map(e=>({chId:e.chId, idx:e.idx}))), pos:0, retry:[]};
  show("game"); drillStep();
}
function drillStep(){
  if(S.pos>=S.list.length){
    if(S.retry.length){ S.list=shuffle(S.retry); S.retry=[]; S.pos=0; }
    else return endDrill();
  }
  const {chId,idx}=S.list[S.pos];
  const ch=CH[chId], item=ch.items[idx];
  $("gPhase").textContent=`錯題重練 ${S.pos+1}/${S.list.length}`;
  $("gPhase").className="phase retry";
  $("gProg").style.width=(S.pos/S.list.length*100)+"%";
  renderItem(ch, item, idx, correct=>{
    const id=qid(chId,idx);
    if(correct){ delete store.wrong[id]; save(); }
    else S.retry.push({chId,idx});
    S.pos++; drillStep();
  });
}
function endDrill(){
  $("sumBody").innerHTML=`
    <div style="text-align:center; padding:40px 10px;">
      <div style="font-size:2.6rem;">✨</div>
      <div class="qtext" style="margin-top:12px;">錯題重練完成！</div>
      <p style="font-size:.88rem; color:#8a8272; line-height:1.7;">答對的題目已從錯題本移除。<br>剩餘待複習：${Object.keys(store.wrong).length} 題</p>
      <div class="btns">
        <button class="btn-line" onclick="renderWrongBook()">查看錯題本</button>
        <button class="btn-fill" onclick="goHome()">回選單</button>
      </div>
    </div>`;
  show("summary");
}

renderHome();

/* ═══════════════ 通行碼閘門（內部使用防護） ═══════════════ */
(function(){
  const K=[56,57,57,49]; // 反向字元碼
  const pass=()=>K.map(c=>String.fromCharCode(c)).reverse().join("");
  let ok=false;
  try{ ok = localStorage.getItem("tea3000_gate")==="ok"; }catch(e){}
  const g=$("gate");
  if(ok){ g.style.display="none"; return; }
  const tryEnter=()=>{
    const v=$("gateInput").value.trim();
    if(v===pass()){
      try{ localStorage.setItem("tea3000_gate","ok"); }catch(e){}
      g.style.display="none";
    } else {
      const inp=$("gateInput");
      inp.classList.remove("err"); void inp.offsetWidth; inp.classList.add("err");
      inp.value=""; inp.focus();
    }
  };
  $("gateBtn").onclick=tryEnter;
  $("gateInput").addEventListener("keydown",e=>{ if(e.key==="Enter") tryEnter(); });
})();
</script>
